apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: photo-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:latest
        ports:
        - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: photo-ns
spec:
  selector:
    app: mongodb
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: art-gallery-app
  namespace: photo-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: art-gallery
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: "25%"
      maxSurge: "25%"
  template:
    metadata:
      labels:
        app: art-gallery
    spec:
      containers:
      - name: server
        image: muhammedsinanust/photostudio:latest
        env:
          - name: MONGODB_AUTH_URI
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: MONGODB_AUTH_URI
          - name: MONGODB_URI
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: MONGODB_URI
---
apiVersion: v1
kind: Service
metadata:
  name: art-gallery-service
  namespace: photo-ns
spec:
  selector:
    app: art-gallery
  ports:
    - port: 80
      targetPort: 3000
  type: NodePort