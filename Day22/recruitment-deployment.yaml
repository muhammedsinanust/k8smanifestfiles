apiVersion: apps/v1
kind: Deployment
metadata:
  name: recruitment-app
  namespace: sinan-ns
  labels:
    app: recruitment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: recruitment
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: "25%"
      maxSurge: "25%"
  template:
    metadata:
      labels:
        app: recruitment
    spec:
      containers:
        - name: recruitment-container
          image: muhammedsinanust/recruitment:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: recruitment-config-map
---
apiVersion: v1
kind: Service
metadata:
  name: recruitment-svc
  namespace: sinan-ns
spec:
  selector:
    app: recruitment
  ports:
    - port: 3001
      targetPort: 3000
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-dept
  namespace: sinan-ns
  labels:
    app: mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo-container
          image: mongo:7.0
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: "rootuser"
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: "rootpassword"
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-svc
  namespace: sinan-ns
spec:
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP