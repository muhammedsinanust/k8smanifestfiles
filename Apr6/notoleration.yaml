apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-tolerated-deployment
  namespace: team3-ns
  labels:
    app: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    resources:
      limits:
        cpu: "200m"
        memory: "256Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80