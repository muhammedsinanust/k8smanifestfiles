apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: photo-app-hpa
  namespace: photo-ns
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: art-gallery-app
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 5
  