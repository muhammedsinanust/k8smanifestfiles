apiVersion: v1
kind: ReplicaSet
metadata:
  name: portfolio-rs
  namespace: sinan-ns
  labels:
    app: portfolio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio
    template:
      metadata:
        labels:
          app: portfolio
        spec:
          containers:
            - name: portfolio-container
              image: muhammedsinanust/portfolio:latest
              ports:
                - containerPort: 80